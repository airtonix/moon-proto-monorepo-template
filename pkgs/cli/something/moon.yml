$schema: "https://moonrepo.dev/schemas/project.json"

language: go

tasks:
  lint:
    script: |
      unset GOROOT
      go vet ./...
  build:
    script: |
      unset GOROOT
      go build ./...
  test:
    script: |
      unset GOROOT
      go test ./...
  package:
    outputs:
      - "dist"
    script: |
      echo "packaged"
  publish:
    script: |
      echo "published"
