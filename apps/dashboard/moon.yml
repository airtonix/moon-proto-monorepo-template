$schema: "https://moonrepo.dev/schemas/project.json"

language: typescript

toolchains:
  default: ["javascript", "bun"]

tasks:
  dev:
    command: "bun run dev"
    options:
      runInCI: false
  lint:
    command: "bun run lint"
  typecheck:
    command: "bun run typecheck"
  build:
    command: "bun run build"
    outputs:
      - "dist"
  test:
    command: "bun run test"
  publish:
    script: |
      TAG="${1:-latest}"
      echo "Dashboard app is not publishable (tag ${TAG})."
