$schema: 'https://moonrepo.dev/schemas/project.json'

language: typescript

toolchains:
  default: ['javascript', 'bun']

tasks:
  dev:
    command: 'bun run dev'
    options:
      runInCI: false
  lint:
    command: 'bun run lint'
  typecheck:
    command: 'bun run typecheck'
  build:
    command: 'bun run build'
    outputs:
      - 'dist'
  test:
    command: 'bun run test'

  publish:
    script: |
      set -euo pipefail
      echo "dashboard publish skeleton"
      echo "args: $*"
      echo "arg1: ${1:-}"
      echo "arg2: ${2:-}"
      echo "PUBLISH_TARGET: ${PUBLISH_TARGET:-}"
      echo "PUBLISH_TAG: ${PUBLISH_TAG:-}"
    outputs:
      - '.artifacts'
    options:
      cache: false
