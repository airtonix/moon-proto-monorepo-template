name: Release

on:
  push:
    branches:
      - release/*

env:
  HUSKY: 0 # https://typicode.github.io/husky/how-to.html#ci-server-and-docker

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  actions: read
  contents: write
  issues: write
  deployments: write
  pull-requests: write
  id-token: write

jobs:
  Process:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }} # release prs merged
      prs_created_or_updated: ${{ steps.release-please.outputs.prs_created }} # release prs created or updated
      prs: ${{ steps.release-please.outputs.prs }}
      pr: ${{ steps.release-please.outputs.pr }}
      sha: ${{ steps.release-please.outputs.sha }}
      outputs: ${{ toJson(steps.release-please.outputs) }}
    steps:
    
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 #v3
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@5bb8f8c1911837cf42064e6490e7634fc842ee7e # v2
        env:
          GITHUB_API_TOKEN: ${{ secrets.ZENOBIUS_MONOREPO_RELEASE_PLEASE_TOKEN }}

      - uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f #v4
        id: release-please
        with:
          token: ${{ secrets.ZENOBIUS_MONOREPO_RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config--hotfix.json
          manifest-file: .release-please-manifest.json
      - name: Print Release Data
        run: |
          echo 'Release Data:'

          echo '''
            ${{ toJSON(steps.release-please.outputs) }}
          '''

  Deploy:
    needs: Process
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 #v3
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@5bb8f8c1911837cf42064e6490e7634fc842ee7e # v2
        env:
          GITHUB_API_TOKEN: ${{ secrets.ZENOBIUS_MONOREPO_RELEASE_PLEASE_TOKEN }}

      - if: ${{ needs.Process.outputs.releases_created == 'true' }}
        id: release-deployment
        run: |
          mise task run deploy --mode hotfix
          mise task run process-tickets --mode hotfix

      - if: ${{ needs.Process.outputs.prs_created_or_updated == 'true' }}
        id: dev-deployment
        run: |
          mise task run deploy --mode dev
          mise task run process-tickets --mode dev
