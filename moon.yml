$schema: "https://moonrepo.dev/schemas/project.json"

language: bash

tasks:
  lint:
    command: "moon run :lint --affected"
  test:
    command: "moon run :test --affected"
  build:
    command: "moon run :build --affected"
  typecheck:
    command: "moon run :typecheck --affected"

  setup:
    depends_on:
      - setup_ai

  setup_ai:
    script: |
      #TODO: create array
      local harnesses=()
      local skills=()
      local commands=()
      harnesses["pi"]=".pi/"
      skills["pi"]="./pi/skills"
      commands["pi"]="./pi/prompts"

      #TODO: for each harness, symlink from
      #  .agents/commands > commands[name]
      #  .agents/skills > skills[name]
