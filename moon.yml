$schema: "https://moonrepo.dev/schemas/project.json"

language: bash

tasks:
  lint:
    command: "moon run :lint --affected"
  test:
    command: "moon run :test --affected"
  build:
    command: "moon run :build --affected"
  typecheck:
    command: "moon run :typecheck --affected"
  debug_env:
    script: |
      env | grep MOON_
